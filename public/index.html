<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port de Plaisance - Connexion</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-container">
        <h1>⚓ Port de Plaisance</h1>

        <div id="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="votre@email.com">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required placeholder="Votre mot de passe">
            </div>

            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>

        <p style="margin-top: 20px; text-align: center; color: #7f8c8d; font-size: 14px;">
            Utilisez un compte existant ou créez-en un nouveau via l'API
        </p>

        <div style="margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: center;">
            <h3 style="margin: 0 0 10px 0;">📘 Documentation</h3>
            <p style="margin: 0;">
                <a href="documentation.html" style="color: #3498db; text-decoration: none; font-weight: bold;">Accéder à
                    la
                    documentation de l'API</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
